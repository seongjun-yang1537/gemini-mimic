<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mimic result</title>
  <style>
    :root {
      color-scheme: light dark;
      --font-sans: "Inter", "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --border-radius-lg: 12px;
      --color-background-primary: #ffffff;
      --color-background-tertiary: #f3f2ef;
      --color-text-primary: #1b1b19;
      --color-text-secondary: #5f5e5a;
      --color-border-tertiary: rgba(95, 94, 90, 0.15);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #121210;
        --color-background-tertiary: #0f0f0e;
        --color-text-primary: #f1efe8;
        --color-text-secondary: #d3d1c7;
        --color-border-tertiary: rgba(211, 209, 199, 0.15);
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
    }

    .card {
      width: min(100%, 680px);
      border-radius: var(--border-radius-lg);
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      padding: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    p {
      margin: 0;
      color: var(--color-text-secondary);
      font-size: 15px;
    }

    a {
      margin-top: 14px;
      display: inline-block;
      color: var(--color-text-primary);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1 id="resultTitle">run result</h1>
    <p id="resultDescription">실행 결과 상세 화면입니다.</p>
    <a id="monitorLink" href="/run/demo">모니터링 화면으로 돌아가기</a>
  </section>
  <script>
    const pathSegments = window.location.pathname.split('/').filter(Boolean);
    const runIdentifier = pathSegments.length >= 3 ? decodeURIComponent(pathSegments[1]) : 'unknown';
    document.getElementById('resultTitle').textContent = `${runIdentifier} result`;
    document.getElementById('resultDescription').textContent = `${runIdentifier} 실행의 결과 상세 뷰입니다.`;
    document.getElementById('monitorLink').setAttribute('href', `/run/${encodeURIComponent(runIdentifier)}`);
  </script>
</body>
</html>
