<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mimic Run</title>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div class="max-w-6xl mx-auto p-6 space-y-6">
      <a href="/" class="text-cyan-300 text-sm">← 대시보드</a>
      <h1 class="text-2xl font-bold">파이프라인 모니터링</h1>

      <div id="phaseBar" class="grid grid-cols-4 gap-3"></div>

      <div class="grid grid-cols-2 gap-4">
        <section class="bg-slate-900 border border-slate-800 rounded-xl p-4">
          <h2 class="font-semibold mb-3">전문가/토론 로그</h2>
          <div id="logs" class="space-y-2 text-sm max-h-[560px] overflow-auto"></div>
        </section>
        <section class="bg-slate-900 border border-slate-800 rounded-xl p-4">
          <h2 class="font-semibold mb-3">미디어 프리뷰</h2>
          <div id="media" class="space-y-3"></div>
        </section>
      </div>
    </div>

    <script>
      const query = new URLSearchParams(window.location.search);
      const runId = query.get('id');
      const phaseLabels = ['Phase 1', 'Phase 2', 'Phase 3', 'Phase 4'];
      const phaseState = { current: 0, done: new Set() };

      function renderPhaseBar() {
        document.getElementById('phaseBar').innerHTML = phaseLabels.map((label, index) => {
          const phase = index + 1;
          const isCurrent = phaseState.current === phase;
          const isDone = phaseState.done.has(phase);
          return `<div class="rounded-lg p-3 border ${isCurrent ? 'border-cyan-400 bg-cyan-500/10' : 'border-slate-800'}">
              <p class="font-semibold">${label}</p>
              <p class="text-xs text-slate-300">${isDone ? '완료' : isCurrent ? '진행 중' : '대기'}</p>
            </div>`;
        }).join('');
      }

      function addLog(text) {
        const logs = document.getElementById('logs');
        const item = document.createElement('div');
        item.className = 'border border-slate-800 rounded-md p-2';
        item.textContent = text;
        logs.appendChild(item);
      }

      function addMedia(mediaType, url) {
        const media = document.getElementById('media');
        if (mediaType === 'image') {
          media.innerHTML += `<img src="${url}" class="w-full rounded-lg border border-slate-800" />`;
          return;
        }
        media.innerHTML += `<video src="${url}" controls class="w-full rounded-lg border border-slate-800"></video>`;
      }

      async function bootstrap() {
        const wsProtocol = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${wsProtocol}://${location.host}/ws/run/${runId}`);

        ws.addEventListener('message', (event) => {
          const payload = JSON.parse(event.data);
          if (payload.type === 'phase_start') {
            phaseState.current = payload.phase;
            renderPhaseBar();
            addLog(`Phase ${payload.phase} 시작`);
          }
          if (payload.type === 'phase_done') {
            phaseState.done.add(payload.phase);
            renderPhaseBar();
            addLog(`Phase ${payload.phase} 완료`);
          }
          if (payload.type === 'debate_message') {
            addLog(`[라운드 ${payload.round}] ${payload.speaker}: ${payload.content}`);
          }
          if (payload.type === 'summary_done') {
            addLog(`정리 결과: ${payload.content}`);
          }
          if (payload.type === 'verdict') {
            addLog(`판정: ${payload.result} (${payload.iteration}회차)`);
          }
          if (payload.type === 'video_generating') {
            addLog(`영상 생성 상태: ${payload.status} (${payload.segment}/${payload.totalSegments})`);
          }
          if (payload.type === 'media_ready') {
            addMedia(payload.mediaType, payload.url);
          }
          if (payload.type === 'pipeline_error') {
            addLog(`에러: ${payload.error}`);
          }
        });

        renderPhaseBar();
      }

      bootstrap();
    </script>
  </body>
</html>
