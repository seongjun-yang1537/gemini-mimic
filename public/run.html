<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mimic Run</title>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div class="max-w-7xl mx-auto p-6 space-y-6">
      <a href="/" class="text-cyan-300 text-sm">← 대시보드</a>
      <h1 class="text-2xl font-bold">파이프라인 모니터링</h1>

      <div id="phaseBar" class="grid grid-cols-4 gap-3"></div>

      <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
        <section class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
          <h2 class="font-semibold">전문가 패널</h2>
          <div id="expertPanel" class="space-y-2 text-sm"></div>
        </section>

        <section class="bg-slate-900 border border-slate-800 rounded-xl p-4 xl:col-span-2 space-y-3">
          <h2 class="font-semibold">토론 로그</h2>
          <div id="debateLog" class="space-y-2 text-sm max-h-[500px] overflow-auto"></div>
        </section>

        <section class="bg-slate-900 border border-slate-800 rounded-xl p-4 xl:col-span-2 space-y-3">
          <h2 class="font-semibold">정리 결과</h2>
          <pre id="summaryLog" class="bg-slate-950 border border-slate-800 rounded-lg p-3 text-xs whitespace-pre-wrap min-h-[220px]"></pre>
        </section>

        <section class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
          <h2 class="font-semibold">미디어 프리뷰</h2>
          <div id="media" class="space-y-3"></div>
        </section>
      </div>
    </div>

    <script>
      const pathSegments = window.location.pathname.split('/').filter(Boolean);
      const runId = pathSegments[1];
      const phaseLabels = ['Phase 1', 'Phase 2', 'Phase 3', 'Phase 4'];
      const phaseState = { current: 0, done: new Set(), phase3Iteration: null };
      const expertStatusMap = new Map();

      function renderPhaseBar() {
        document.getElementById('phaseBar').innerHTML = phaseLabels
          .map((label, index) => {
            const phaseNumber = index + 1;
            const isCurrentPhase = phaseState.current === phaseNumber;
            const isCompletedPhase = phaseState.done.has(phaseNumber);
            const iterationTag = phaseNumber === 3 && phaseState.phase3Iteration
              ? `<p class="text-xs text-amber-300">재생성 ${phaseState.phase3Iteration}/3회차</p>`
              : '';

            return `<div class="rounded-lg p-3 border ${isCurrentPhase ? 'border-cyan-400 bg-cyan-500/10' : 'border-slate-800'}">
              <p class="font-semibold">${label}</p>
              <p class="text-xs text-slate-300">${isCompletedPhase ? '완료' : isCurrentPhase ? '진행 중' : '대기'}</p>
              ${iterationTag}
            </div>`;
          })
          .join('');
      }

      function renderExpertPanel() {
        const expertPanelElement = document.getElementById('expertPanel');
        const expertCards = Array.from(expertStatusMap.entries()).map(([expertName, expertInfo]) => {
          const indicatorColor = expertInfo.status === 'done' ? 'bg-emerald-400' : expertInfo.status === 'running' ? 'bg-amber-300' : 'bg-slate-500';

          return `<button type="button" data-expert="${expertName}" class="w-full text-left border border-slate-800 rounded-md p-2 hover:border-cyan-300 transition-colors">
            <div class="flex items-center justify-between">
              <span class="font-semibold">${expertName}</span>
              <span class="inline-block w-2 h-2 rounded-full ${indicatorColor}"></span>
            </div>
            <p class="text-xs text-slate-400 mt-1">${expertInfo.statusText}</p>
          </button>`;
        });

        expertPanelElement.innerHTML = expertCards.join('');

        document.querySelectorAll('button[data-expert]').forEach((expertButton) => {
          expertButton.addEventListener('click', () => {
            const clickedExpertName = expertButton.dataset.expert;
            const expertInfo = expertStatusMap.get(clickedExpertName);
            if (!expertInfo || !expertInfo.response) {
              return;
            }
            const summaryLogElement = document.getElementById('summaryLog');
            summaryLogElement.textContent = `[${clickedExpertName}]\n\n${expertInfo.response}`;
          });
        });
      }

      function appendDebateLog(logText, isFacilitator = false) {
        const debateLogElement = document.getElementById('debateLog');
        const lineElement = document.createElement('div');
        lineElement.className = `border rounded-md p-2 ${isFacilitator ? 'border-cyan-500 bg-cyan-500/10' : 'border-slate-800'}`;
        lineElement.textContent = logText;
        debateLogElement.appendChild(lineElement);
        debateLogElement.scrollTop = debateLogElement.scrollHeight;
      }

      function addMedia(mediaType, mediaUrl) {
        const mediaElement = document.getElementById('media');
        if (mediaType === 'image') {
          mediaElement.innerHTML += `<img src="${mediaUrl}" class="w-full rounded-lg border border-slate-800" />`;
          return;
        }
        mediaElement.innerHTML += `<video src="${mediaUrl}" controls class="w-full rounded-lg border border-slate-800"></video>`;
      }

      function ensureExpert(expertName) {
        if (!expertStatusMap.has(expertName)) {
          expertStatusMap.set(expertName, { status: 'idle', statusText: '대기', response: '' });
        }
      }

      function handleWsEvent(payload) {
        if (payload.type === 'phase_start') {
          phaseState.current = payload.phase;
          renderPhaseBar();
          appendDebateLog(`Phase ${payload.phase} 시작`);
        }

        if (payload.type === 'phase_done') {
          phaseState.done.add(payload.phase);
          renderPhaseBar();
          appendDebateLog(`Phase ${payload.phase} 완료`);
        }

        if (payload.type === 'expert_start') {
          ensureExpert(payload.expert);
          const expertInfo = expertStatusMap.get(payload.expert);
          expertInfo.status = 'running';
          expertInfo.statusText = '분석/평가 진행 중';
          renderExpertPanel();
        }

        if (payload.type === 'expert_done') {
          ensureExpert(payload.expert);
          const expertInfo = expertStatusMap.get(payload.expert);
          expertInfo.status = 'done';
          expertInfo.statusText = '완료';
          expertInfo.response = payload.response;
          renderExpertPanel();
        }

        if (payload.type === 'debate_message') {
          const isFacilitator = payload.role === 'facilitator';
          if (payload.speaker?.includes('진행자') || payload.role === 'facilitator') {
            ensureExpert(payload.speaker);
            const facilitatorState = expertStatusMap.get(payload.speaker);
            facilitatorState.status = 'done';
            facilitatorState.statusText = '토론 진행 중';
            facilitatorState.response = `${facilitatorState.response || ''}\n\n[라운드 ${payload.round}] ${payload.content}`.trim();
            renderExpertPanel();
          }
          appendDebateLog(`[라운드 ${payload.round}] ${payload.speaker}: ${payload.content}`, isFacilitator);
        }

        if (payload.type === 'debate_round_end') {
          appendDebateLog(`── 라운드 ${payload.round}/3 종료 ──`);
        }

        if (payload.type === 'summary_done') {
          document.getElementById('summaryLog').textContent = payload.content;
          appendDebateLog('정리 전문가 결과가 업데이트되었습니다.');
        }

        if (payload.type === 'verdict') {
          phaseState.phase3Iteration = payload.iteration;
          renderPhaseBar();
          appendDebateLog(`판정: ${payload.result === 'pass' ? '합격' : '불합격'} (${payload.iteration}회차)`);
        }

        if (payload.type === 'video_generating') {
          appendDebateLog(`영상 생성 상태: ${payload.status} (${payload.segment}/${payload.totalSegments})`);
        }

        if (payload.type === 'media_ready') {
          addMedia(payload.mediaType, payload.url);
        }

        if (payload.type === 'pipeline_done') {
          appendDebateLog(`파이프라인 완료: ${payload.resultUrl}`);
        }

        if (payload.type === 'pipeline_error') {
          appendDebateLog(`에러: ${payload.error}`);
        }
      }

      function bootstrap() {
        const wsProtocol = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${wsProtocol}://${location.host}/ws/run/${runId}`);

        ws.addEventListener('message', (event) => {
          const payload = JSON.parse(event.data);
          handleWsEvent(payload);
        });

        renderPhaseBar();
        renderExpertPanel();
      }

      bootstrap();
    </script>
  </body>
</html>
