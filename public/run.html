<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Mimic Run</title>
    <style>
      .monitor-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 16px;
      }

      .expert-card {
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        margin-bottom: 8px;
        cursor: pointer;
        transition: background 0.15s;
        background: transparent;
        width: 100%;
        text-align: left;
      }

      .expert-card:hover {
        background: var(--bg-tertiary);
      }

      .expert-name {
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .expert-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .debate-area {
        overflow-y: auto;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--bg-chat);
        max-height: 560px;
      }

      .debate-message {
        margin-bottom: 16px;
        max-width: 85%;
      }

      .debate-message.expert {
        margin-right: auto;
      }

      .debate-message.facilitator {
        max-width: 100%;
        background: var(--bg-secondary);
        border-radius: 12px;
        padding: 16px;
      }

      .debate-message.error {
        max-width: 100%;
        background: var(--error-bg);
        border: 1px solid #fca5a5;
        border-radius: 12px;
        padding: 12px 16px;
        color: var(--error);
        font-size: 13px;
      }

      .message-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .message-speaker {
        font-size: 13px;
        font-weight: 600;
      }

      .message-round {
        font-size: 12px;
        color: var(--text-tertiary);
      }

      .round-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0;
        color: var(--text-tertiary);
        font-size: 12px;
      }

      .round-divider::before,
      .round-divider::after {
        content: '';
        flex: 1;
        border-top: 1px solid var(--border);
      }

      .scenario-result {
        background: var(--bg-chat);
        border: 2px solid var(--accent);
        border-radius: 12px;
        padding: 24px;
        margin-top: 16px;
        white-space: pre-wrap;
      }

      .scenario-result h3 {
        color: var(--accent);
        margin-bottom: 12px;
      }

      .media-preview {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .media-preview img,
      .media-preview video {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
      }

      @media (max-width: 960px) {
        .monitor-layout {
          grid-template-columns: 1fr;
        }

        .media-preview {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-title">Mimic</div>
        <a href="/" class="sidebar-item">📋 대시보드</a>
        <a href="/prompts" class="sidebar-item">📝 프롬프트</a>
        <a href="/assets" class="sidebar-item">🗂️ 에셋</a>
      </aside>
      <main class="main-content page-enter page-enter-active">
        <header class="page-header">
          <div class="page-header-start">
            <a href="/" class="btn-secondary">← 대시보드</a>
            <h1>파이프라인 모니터링</h1>
          </div>
        </header>
        <div id="statusBar" class="status-bar">🔄 실행 준비 중...</div>

        <section class="monitor-layout">
          <section class="card">
            <h2 style="margin-bottom: 12px;">전문가 패널</h2>
            <div id="expertPanel"></div>
          </section>

          <section>
            <div class="card" style="margin-bottom: 16px;">
              <h2 style="margin-bottom: 12px;">토론 로그</h2>
              <div id="debateLog" class="debate-area"></div>
            </div>
            <div class="card" style="margin-bottom: 16px;">
              <h2 style="margin-bottom: 12px;">미디어 프리뷰</h2>
              <div id="media" class="media-preview"></div>
            </div>
            <div class="scenario-result">
              <h3>최종 시나리오</h3>
              <div id="summaryLog"></div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script>
      const pathSegments = window.location.pathname.split('/').filter(Boolean);
      const runId = pathSegments[1];
      const expertStatusMap = new Map();
      const expertColorMap = {
        '훅 전문가': 'var(--expert-hook)',
        '스토리 전문가': 'var(--expert-story)',
        'CTA 전문가': 'var(--expert-cta)',
        '액션 전문가': 'var(--expert-action)',
        '캐릭터 전문가': 'var(--expert-character)',
        진행자: 'var(--facilitator)',
        정리: 'var(--summarizer)',
      };

      function updateStatusBar(messageText) {
        document.getElementById('statusBar').textContent = messageText;
      }

      function getExpertColor(expertName) {
        return expertColorMap[expertName] || 'var(--text-secondary)';
      }

      function getExpertStatusIcon(statusValue) {
        if (statusValue === 'done') {
          return '✅';
        }
        if (statusValue === 'running') {
          return '🔄';
        }
        if (statusValue === 'failed') {
          return '❌';
        }
        return '⏳';
      }

      function renderExpertPanel() {
        const expertPanelElement = document.getElementById('expertPanel');
        expertPanelElement.innerHTML = Array.from(expertStatusMap.entries()).map(([expertName, expertInfo]) => {
          const dotColor = getExpertColor(expertName);
          return `
            <button type="button" data-expert="${expertName}" class="expert-card">
              <div style="display: flex; justify-content: space-between; gap: 8px;">
                <div class="expert-name">
                  <span class="expert-dot" style="background: ${dotColor};"></span>
                  <span>${expertName}</span>
                </div>
                <span>${getExpertStatusIcon(expertInfo.status)}</span>
              </div>
              <div class="caption">${expertInfo.statusText}</div>
            </button>
          `;
        }).join('');

        document.querySelectorAll('[data-expert]').forEach((expertButtonElement) => {
          expertButtonElement.addEventListener('click', () => {
            const selectedExpert = expertStatusMap.get(expertButtonElement.dataset.expert);
            if (selectedExpert && selectedExpert.response) {
              document.getElementById('summaryLog').textContent = selectedExpert.response;
            }
          });
        });
      }

      function appendDebateMessage(messageData) {
        const debateLogElement = document.getElementById('debateLog');
        const messageElement = document.createElement('div');
        messageElement.className = `debate-message ${messageData.isError ? 'error' : messageData.isFacilitator ? 'facilitator' : 'expert'} message-enter message-enter-active`;

        if (messageData.isError) {
          messageElement.textContent = messageData.content;
          debateLogElement.appendChild(messageElement);
          debateLogElement.scrollTop = debateLogElement.scrollHeight;
          return;
        }

        const speakerColor = getExpertColor(messageData.speaker || '');
        messageElement.innerHTML = `
          <div class="message-header">
            <span class="message-speaker" style="color: ${speakerColor};">${messageData.speaker}</span>
            ${messageData.round ? `<span class="message-round">라운드 ${messageData.round}</span>` : ''}
          </div>
          <div class="message-content">${messageData.content}</div>
        `;
        debateLogElement.appendChild(messageElement);
        debateLogElement.scrollTop = debateLogElement.scrollHeight;
      }

      function appendRoundDivider(roundNumber) {
        const debateLogElement = document.getElementById('debateLog');
        const dividerElement = document.createElement('div');
        dividerElement.className = 'round-divider';
        dividerElement.textContent = `라운드 ${roundNumber}/3 종료`;
        debateLogElement.appendChild(dividerElement);
        debateLogElement.scrollTop = debateLogElement.scrollHeight;
      }

      function addMedia(mediaType, mediaUrl) {
        const mediaElement = document.getElementById('media');
        if (mediaType === 'image') {
          mediaElement.innerHTML += `<img src="${mediaUrl}" alt="generated" />`;
          return;
        }
        mediaElement.innerHTML += `<video src="${mediaUrl}" controls></video>`;
      }

      function ensureExpert(expertName) {
        if (!expertStatusMap.has(expertName)) {
          expertStatusMap.set(expertName, { status: 'idle', statusText: '대기', response: '' });
        }
      }

      function handleWsEvent(payload) {
        if (payload.type === 'phase_start') {
          updateStatusBar(`🔄 Phase ${payload.phase} 진행 중...`);
          appendDebateMessage({ speaker: '시스템', content: `Phase ${payload.phase} 시작` });
        }

        if (payload.type === 'phase_done') {
          updateStatusBar(`✅ Phase ${payload.phase} 완료`);
          appendDebateMessage({ speaker: '시스템', content: `Phase ${payload.phase} 완료` });
        }

        if (payload.type === 'expert_start') {
          ensureExpert(payload.expert);
          const expertInfo = expertStatusMap.get(payload.expert);
          expertInfo.status = 'running';
          expertInfo.statusText = '분석 진행 중';
          renderExpertPanel();
        }

        if (payload.type === 'expert_done') {
          ensureExpert(payload.expert);
          const expertInfo = expertStatusMap.get(payload.expert);
          expertInfo.status = 'done';
          expertInfo.statusText = '완료';
          expertInfo.response = payload.response;
          renderExpertPanel();
        }

        if (payload.type === 'debate_message') {
          if (payload.role === 'facilitator') {
            ensureExpert(payload.speaker);
            const facilitatorInfo = expertStatusMap.get(payload.speaker);
            facilitatorInfo.status = 'done';
            facilitatorInfo.statusText = '토론 진행';
            facilitatorInfo.response = `${facilitatorInfo.response}\n${payload.content}`.trim();
            renderExpertPanel();
          }

          appendDebateMessage({
            speaker: payload.speaker,
            round: payload.round,
            content: payload.content,
            isFacilitator: payload.role === 'facilitator',
          });
        }

        if (payload.type === 'debate_round_end') {
          appendRoundDivider(payload.round);
          updateStatusBar(`🔄 토론 라운드 ${payload.round}/3 진행 중...`);
        }

        if (payload.type === 'summary_done') {
          document.getElementById('summaryLog').textContent = payload.content;
          updateStatusBar('✅ 시나리오 확정 완료');
        }

        if (payload.type === 'verdict') {
          const verdictText = payload.result === 'pass' ? '합격' : '불합격';
          appendDebateMessage({ speaker: '판정', content: `${payload.iteration}회차 ${verdictText}` });
        }

        if (payload.type === 'video_generating') {
          updateStatusBar(`🔄 영상 생성 중... ${payload.segment}/${payload.totalSegments}`);
        }

        if (payload.type === 'media_ready') {
          addMedia(payload.mediaType, payload.url);
        }

        if (payload.type === 'pipeline_done') {
          updateStatusBar('✅ 시나리오 확정 완료');
          appendDebateMessage({ speaker: '시스템', content: `결과: ${payload.resultUrl}` });
        }

        if (payload.type === 'pipeline_error') {
          const pipelineErrorMessage = payload.error === '레퍼런스 이미지 파일 없음'
            ? '레퍼런스 이미지가 없어 기본 설정으로 다음 단계를 진행합니다.'
            : payload.error;
          updateStatusBar(`❌ ${pipelineErrorMessage}`);
          appendDebateMessage({ content: `❌ ${pipelineErrorMessage}`, isError: true });
        }
      }

      function bootstrap() {
        const wsProtocol = location.protocol === 'https:' ? 'wss' : 'ws';
        const websocketClient = new WebSocket(`${wsProtocol}://${location.host}/ws/run/${runId}`);
        websocketClient.addEventListener('message', (event) => {
          const payload = JSON.parse(event.data);
          handleWsEvent(payload);
        });
      }

      bootstrap();
    </script>
  </body>
</html>
