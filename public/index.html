<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mimic</title>
  <style>
    :root {
      color-scheme: light dark;
      --font-sans: "Inter", "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --border-radius-xl: 16px;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8f8f6;
      --color-background-tertiary: #f3f2ef;
      --color-background-info: #e6f1fb;
      --color-background-danger: #fcebeb;
      --color-background-success: #e1f5ee;
      --color-background-warning: #faeeda;
      --color-text-primary: #1b1b19;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-text-info: #0c447c;
      --color-text-danger: #791f1f;
      --color-text-success: #085041;
      --color-text-warning: #633806;
      --color-border-primary: rgba(95, 94, 90, 0.4);
      --color-border-secondary: rgba(95, 94, 90, 0.3);
      --color-border-tertiary: rgba(95, 94, 90, 0.15);
      --color-border-info: #185fa5;
      --color-border-danger: #a32d2d;
      --color-border-success: #0f6e56;
      --color-border-warning: #854f0b;
      --purple-50: #eeedfe;
      --purple-100: #cecbf6;
      --purple-200: #afa9ec;
      --purple-400: #7f77dd;
      --purple-600: #534ab7;
      --purple-800: #3c3489;
      --teal-50: #e1f5ee;
      --teal-100: #9fe1cb;
      --teal-200: #5dcaa5;
      --teal-600: #0f6e56;
      --teal-800: #085041;
      --red-50: #fcebeb;
      --red-100: #f7c1c1;
      --red-200: #f09595;
      --red-600: #a32d2d;
      --red-800: #791f1f;
      --coral-600: #d85a30;
      --blue-600: #185fa5;
      --pink-600: #993556;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #121210;
        --color-background-secondary: #1b1b19;
        --color-background-tertiary: #0f0f0e;
        --color-background-info: #0c447c;
        --color-background-danger: #791f1f;
        --color-background-success: #085041;
        --color-background-warning: #633806;
        --color-text-primary: #f1efe8;
        --color-text-secondary: #d3d1c7;
        --color-text-tertiary: #b4b2a9;
        --color-text-info: #b5d4f4;
        --color-text-danger: #f7c1c1;
        --color-text-success: #9fe1cb;
        --color-text-warning: #fac775;
        --color-border-primary: rgba(211, 209, 199, 0.4);
        --color-border-secondary: rgba(211, 209, 199, 0.3);
        --color-border-tertiary: rgba(211, 209, 199, 0.15);
        --color-border-info: #85b7eb;
        --color-border-danger: #f09595;
        --color-border-success: #5dcaa5;
        --color-border-warning: #ef9f27;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      font-size: 16px;
      line-height: 1.7;
    }

    .page-header {
      border-bottom: 0.5px solid var(--color-border-tertiary);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-background-primary);
    }

    .header-inner {
      width: min(100%, 780px);
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 500;
      color: var(--color-text-primary);
      white-space: nowrap;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--border-radius-md);
      background: var(--purple-600);
      color: var(--purple-50);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .nav-link {
      border: 0;
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 14px;
      font-weight: 400;
      padding: 4px 0;
      cursor: pointer;
    }

    .nav-link.active {
      color: var(--color-text-primary);
      font-weight: 500;
    }

    .usage-summary {
      color: var(--color-text-tertiary);
      font-size: 12px;
      white-space: nowrap;
    }

    main {
      width: min(100%, 780px);
      margin: 0 auto;
      padding: 52px 24px 40px;
    }

    .hero-title {
      margin: 0 0 28px;
      text-align: center;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }

    .composer {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-xl);
      padding: 14px 14px 12px;
    }

    .composer textarea {
      width: 100%;
      border: 0;
      outline: 0;
      resize: none;
      min-height: 58px;
      background: transparent;
      color: var(--color-text-primary);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.6;
      padding: 0;
    }

    .composer textarea::placeholder { color: var(--color-text-tertiary); }

    .attachment-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .attachment-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-tertiary);
      padding: 4px 8px;
      max-width: 190px;
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .attachment-chip .label {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-chip button {
      border: 0;
      background: transparent;
      color: var(--color-text-tertiary);
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      line-height: 1;
    }

    .composer-toolbar {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 0.5px solid var(--color-border-tertiary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .toolbar-left,
    .toolbar-center,
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .attach-button,
    .toolbar-pill {
      height: 32px;
      border-radius: 6px;
      border: 0.5px solid var(--color-border-tertiary);
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 400;
      padding: 0 10px;
      cursor: pointer;
    }

    .toolbar-pill {
      display: inline-flex;
      align-items: center;
      color: var(--color-text-secondary);
    }

    .send-button {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 0.5px solid var(--color-border-tertiary);
      background: var(--color-background-secondary);
      color: var(--color-text-tertiary);
      font-size: 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s ease;
    }

    .send-button.active {
      background: var(--purple-600);
      color: var(--purple-50);
      border-color: transparent;
    }

    .send-button:active,
    .attach-button:active,
    .toolbar-pill:active,
    .tab-button:active,
    .task-row:active { transform: scale(0.98); }

    .tabs-bar {
      margin-top: 36px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      padding-bottom: 8px;
    }

    .tabs {
      display: flex;
      align-items: flex-end;
      gap: 18px;
    }

    .tab-button {
      border: 0;
      background: transparent;
      color: var(--color-text-tertiary);
      font-size: 14px;
      font-weight: 400;
      padding: 0 0 8px;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .tab-button.active {
      color: var(--color-text-primary);
      font-weight: 500;
      border-bottom-color: var(--color-text-primary);
    }

    .count-badge {
      border-radius: 99px;
      padding: 1px 7px;
      font-size: 11px;
      border: 0.5px solid var(--color-border-tertiary);
      color: var(--color-text-tertiary);
      background: transparent;
    }

    .tab-button.active .count-badge {
      background: var(--purple-50);
      border-color: var(--purple-200);
      color: var(--purple-800);
    }

    .status-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .summary-pill,
    .status-badge {
      border-radius: 99px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 400;
      border: 0.5px solid transparent;
    }

    .summary-pill[data-variant="running"],
    .status-badge[data-status="running"] {
      background: var(--purple-50);
      border-color: var(--purple-200);
      color: var(--purple-800);
    }

    .summary-pill[data-variant="completed"],
    .status-badge[data-status="completed"] {
      background: var(--teal-50);
      border-color: var(--teal-200);
      color: var(--teal-800);
    }

    .summary-pill[data-variant="failed"],
    .status-badge[data-status="failed"] {
      background: var(--red-50);
      border-color: var(--red-200);
      color: var(--red-800);
    }

    .summary-pill[data-zero="true"] {
      background: var(--color-background-secondary);
      color: var(--color-text-tertiary);
      border-color: var(--color-border-tertiary);
    }

    .tab-panel { min-height: 300px; }

    .task-list { margin-top: 0; }

    .task-row {
      width: 100%;
      border: 0;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      background: transparent;
      padding: 14px 6px;
      cursor: pointer;
      text-align: left;
      transition: background-color 0.15s ease;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto minmax(72px, 88px) auto;
      gap: 10px;
      align-items: center;
    }

    .task-row:hover { background: var(--color-background-secondary); }

    .phase-ring {
      width: 34px;
      height: 34px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    .phase-ring svg {
      width: 34px;
      height: 34px;
      transform: rotate(-90deg);
      position: absolute;
      inset: 0;
    }

    .phase-ring .track {
      fill: none;
      stroke: var(--color-border-tertiary);
      stroke-width: 2.6;
    }

    .phase-ring .progress {
      fill: none;
      stroke-width: 2.6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.2s ease;
    }

    .phase-ring[data-status="running"] .progress { stroke: var(--purple-600); }
    .phase-ring[data-status="completed"] .progress { stroke: var(--teal-600); }
    .phase-ring[data-status="failed"] .progress { stroke: var(--red-600); }

    .phase-ring .icon {
      position: relative;
      z-index: 1;
      color: var(--color-text-secondary);
    }

    .phase-ring[data-status="completed"] .icon { color: var(--teal-600); font-size: 13px; }
    .phase-ring[data-status="failed"] .icon { color: var(--red-600); font-size: 13px; }

    .orbit-wrap {
      width: 34px;
      height: 34px;
      position: absolute;
      inset: 0;
      animation: orbit 2.4s linear infinite;
      display: none;
    }

    .phase-ring[data-status="running"] .orbit-wrap { display: block; }

    .orbit-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple-600);
      position: absolute;
      top: -2px;
      left: 14px;
    }

    .task-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .task-title-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .task-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .expert-dots {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .expert-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .expert-hook { background: var(--purple-600); }
    .expert-story { background: var(--teal-600); }
    .expert-cta { background: var(--coral-600); }
    .expert-action { background: var(--blue-600); }
    .expert-character { background: var(--pink-600); }

    .task-meta {
      font-size: 12px;
      color: var(--color-text-tertiary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-meta .detail-running { color: var(--purple-600); font-weight: 500; }
    .task-meta .detail-failed { color: var(--red-600); }

    .phase-track {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .phase-step {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 0.5px solid var(--color-border-tertiary);
      background: var(--color-background-secondary);
      color: var(--color-text-tertiary);
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .phase-step.completed {
      border-color: var(--teal-200);
      background: var(--teal-50);
      color: var(--teal-800);
    }

    .phase-step.current {
      border-color: var(--purple-200);
      background: var(--purple-50);
      color: var(--purple-800);
    }

    .phase-step.failed {
      border-color: var(--red-200);
      background: var(--red-50);
      color: var(--red-800);
    }

    .phase-link {
      width: 12px;
      height: 0;
      border-top: 0.5px solid var(--color-border-tertiary);
    }

    .phase-link.completed { border-top-color: var(--teal-200); }

    .cost-column {
      text-align: right;
      min-width: 72px;
    }

    .cost-usd {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-secondary);
      line-height: 1.4;
    }

    .cost-token {
      font-size: 12px;
      color: var(--color-text-tertiary);
      line-height: 1.4;
    }

    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--color-text-tertiary);
      font-size: 14px;
    }

    .sub-panel {
      padding: 24px 4px;
      color: var(--color-text-secondary);
      font-size: 14px;
    }

    @keyframes orbit {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    @media (prefers-color-scheme: dark) {
      .send-button.active {
        background: var(--purple-400);
        color: var(--purple-100);
      }

      .summary-pill[data-variant="running"],
      .status-badge[data-status="running"],
      .phase-step.current,
      .tab-button.active .count-badge {
        background: var(--purple-800);
        border-color: var(--purple-200);
        color: var(--purple-100);
      }

      .summary-pill[data-variant="completed"],
      .status-badge[data-status="completed"],
      .phase-step.completed {
        background: var(--teal-800);
        border-color: var(--teal-200);
        color: var(--teal-100);
      }

      .summary-pill[data-variant="failed"],
      .status-badge[data-status="failed"],
      .phase-step.failed {
        background: var(--red-800);
        border-color: var(--red-200);
        color: var(--red-100);
      }

      .task-meta .detail-running { color: var(--purple-100); }
      .task-meta .detail-failed { color: var(--red-100); }
    }

    @media (max-width: 640px) {
      .phase-track,
      .cost-column { display: none; }

      .task-row {
        grid-template-columns: 42px minmax(0, 1fr) auto;
      }

      .header-inner,
      main { padding-left: 16px; padding-right: 16px; }
      .hero-title { font-size: 22px; }
      .usage-summary { display: none; }
    }

    @media (max-width: 480px) {
      .toolbar-pill { display: none; }
      .tabs-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
      .status-summary { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="header-inner">
      <div class="brand-nav">
        <div class="brand"><span class="brand-icon">Mi</span><span>Mimic</span></div>
        <nav class="nav-links" aria-label="주요">
          <button class="nav-link active" type="button">대시보드</button>
          <button class="nav-link" type="button">프롬프트</button>
          <button class="nav-link" type="button">에셋</button>
          <button class="nav-link" type="button">설정</button>
        </nav>
      </div>
      <div class="usage-summary">API: 142 · 비용: $4.27</div>
    </div>
  </header>

  <main>
    <h1 class="hero-title">어떤 밈을 크리에이티브로 만들까요?</h1>

    <section class="composer" aria-label="입력 영역">
      <textarea id="promptInput" rows="2" placeholder="밈 영상을 업로드하거나, 만들고 싶은 크리에이티브를 설명해주세요"></textarea>
      <div class="attachment-list" id="attachmentList"></div>
      <div class="composer-toolbar">
        <div class="toolbar-left">
          <input id="fileInput" type="file" accept="video/*,image/*" multiple hidden>
          <button class="attach-button" id="attachButton" type="button">+ 첨부</button>
        </div>
        <div class="toolbar-center">
          <button class="toolbar-pill" id="modelPill" type="button">Gemini 3 Pro</button>
          <button class="toolbar-pill" id="roundPill" type="button">토론 3R</button>
        </div>
        <div class="toolbar-right">
          <button class="send-button" id="sendButton" type="button" aria-label="전송">→</button>
        </div>
      </div>
    </section>

    <section class="tabs-bar">
      <div class="tabs" role="tablist" aria-label="대시보드 탭">
        <button class="tab-button active" type="button" role="tab" aria-selected="true" data-tab="tasks">작업 <span class="count-badge" id="tasksCountBadge">3</span></button>
        <button class="tab-button" type="button" role="tab" aria-selected="false" data-tab="prompts">프롬프트 <span class="count-badge">13</span></button>
        <button class="tab-button" type="button" role="tab" aria-selected="false" data-tab="assets">에셋</button>
      </div>
      <div class="status-summary" id="statusSummary"></div>
    </section>

    <section class="tab-panel" id="tabPanel"></section>
  </main>

  <script>
    const dashboardState = {
      selectedTab: 'tasks',
      selectedModel: 'Gemini 3 Pro',
      selectedRounds: 3,
      attachments: [],
      tasks: [
        {
          id: 'run-001',
          title: '고양이 밈 — 놀란 표정 리액션',
          input: 'cat_reaction.mp4',
          inputType: 'video',
          status: 'running',
          phase: 2,
          phaseDetail: '토론 2라운드 진행 중',
          activeExperts: ['hook', 'story', 'cta'],
          createdAt: '3분 전',
          tokens: 12482,
          cost: 0.24
        },
        {
          id: 'run-002',
          title: 'GTA 워스텔 — 용사 등장씬',
          input: 'gta_intro.mp4',
          inputType: 'video',
          status: 'completed',
          phase: 4,
          phaseDetail: '완료',
          activeExperts: [],
          createdAt: '28분 전',
          tokens: 78342,
          cost: 1.42
        },
        {
          id: 'run-003',
          title: 'This is fine — 보스전 밈',
          input: 'this_is_fine.gif',
          inputType: 'image',
          status: 'failed',
          phase: 3,
          phaseDetail: 'Veo3 실패',
          activeExperts: [],
          createdAt: '2시간 전',
          tokens: 28731,
          cost: 0.56
        }
      ]
    };

    const promptInputElement = document.getElementById('promptInput');
    const sendButtonElement = document.getElementById('sendButton');
    const attachButtonElement = document.getElementById('attachButton');
    const fileInputElement = document.getElementById('fileInput');
    const attachmentListElement = document.getElementById('attachmentList');
    const tabPanelElement = document.getElementById('tabPanel');
    const statusSummaryElement = document.getElementById('statusSummary');
    const tasksCountBadgeElement = document.getElementById('tasksCountBadge');
    const modelPillElement = document.getElementById('modelPill');
    const roundPillElement = document.getElementById('roundPill');

    function formatTokenCount(tokenCount) {
      return `${new Intl.NumberFormat('ko-KR').format(Math.round(tokenCount))} tok`;
    }

    function formatUsdCost(costValue) {
      return `$${Number(costValue).toFixed(2)}`;
    }

    function getExpertClass(expertKey) {
      const expertClassMap = {
        hook: 'expert-hook',
        story: 'expert-story',
        cta: 'expert-cta',
        action: 'expert-action',
        character: 'expert-character'
      };
      return expertClassMap[expertKey] || 'expert-hook';
    }

    function computeRingProgress(taskItem) {
      const phaseRatio = Math.max(0, Math.min(1, (taskItem.phase - 1) / 4));
      if (taskItem.status === 'completed') {
        return 1;
      }
      return phaseRatio;
    }

    function createPhaseTrack(taskItem) {
      const phaseMarkup = [];
      for (let phaseIndex = 1; phaseIndex <= 4; phaseIndex += 1) {
        let phaseClassName = '';
        let phaseLabel = String(phaseIndex);
        if (phaseIndex < taskItem.phase || taskItem.status === 'completed') {
          phaseClassName = 'completed';
          phaseLabel = '✓';
        }
        if (taskItem.status === 'running' && phaseIndex === taskItem.phase) {
          phaseClassName = 'current';
          phaseLabel = String(phaseIndex);
        }
        if (taskItem.status === 'failed' && phaseIndex === taskItem.phase) {
          phaseClassName = 'failed';
          phaseLabel = String(phaseIndex);
        }
        if (taskItem.status === 'failed' && phaseIndex < taskItem.phase) {
          phaseClassName = 'completed';
          phaseLabel = '✓';
        }
        phaseMarkup.push(`<span class="phase-step ${phaseClassName}">${phaseLabel}</span>`);
        if (phaseIndex < 4) {
          const isCompletedLink = taskItem.status === 'completed' || phaseIndex < taskItem.phase;
          phaseMarkup.push(`<span class="phase-link ${isCompletedLink ? 'completed' : ''}"></span>`);
        }
      }
      return phaseMarkup.join('');
    }

    function buildTaskRow(taskItem) {
      const ringRadius = 15;
      const ringCircumference = 2 * Math.PI * ringRadius;
      const ringProgress = computeRingProgress(taskItem);
      const ringOffset = ringCircumference * (1 - ringProgress);
      const ringLabel = taskItem.status === 'completed' ? '✓' : taskItem.status === 'failed' ? '!' : String(taskItem.phase);
      const detailClass = taskItem.status === 'running' ? 'detail-running' : taskItem.status === 'failed' ? 'detail-failed' : '';
      const expertsMarkup = taskItem.activeExperts.map((expertKey) => `<span class="expert-dot ${getExpertClass(expertKey)}"></span>`).join('');

      return `
        <button class="task-row" type="button" data-run-id="${taskItem.id}">
          <span class="phase-ring" data-status="${taskItem.status}">
            <svg viewBox="0 0 36 36" aria-hidden="true">
              <circle class="track" cx="18" cy="18" r="${ringRadius}"></circle>
              <circle class="progress" cx="18" cy="18" r="${ringRadius}" stroke-dasharray="${ringCircumference}" stroke-dashoffset="${ringOffset}"></circle>
            </svg>
            <span class="icon">${ringLabel}</span>
            <span class="orbit-wrap"><span class="orbit-dot"></span></span>
          </span>
          <span class="task-main">
            <span class="task-title-line">
              <span class="task-title">${taskItem.title}</span>
              <span class="expert-dots">${expertsMarkup}</span>
            </span>
            <span class="task-meta">${taskItem.createdAt} · <span class="${detailClass}">${taskItem.phaseDetail}</span></span>
          </span>
          <span class="phase-track">${createPhaseTrack(taskItem)}</span>
          <span class="cost-column"><span class="cost-usd">${formatUsdCost(taskItem.cost)}</span><br><span class="cost-token">${formatTokenCount(taskItem.tokens)}</span></span>
          <span class="status-badge" data-status="${taskItem.status}">${taskItem.status === 'running' ? '진행 중' : taskItem.status === 'completed' ? '완료' : '실패'}</span>
        </button>
      `;
    }

    function renderStatusSummary() {
      const runningCount = dashboardState.tasks.filter((taskItem) => taskItem.status === 'running').length;
      const completedCount = dashboardState.tasks.filter((taskItem) => taskItem.status === 'completed').length;
      const failedCount = dashboardState.tasks.filter((taskItem) => taskItem.status === 'failed').length;

      statusSummaryElement.innerHTML = `
        <span class="summary-pill" data-variant="running" data-zero="${runningCount === 0}">${runningCount} 진행 중</span>
        <span class="summary-pill" data-variant="completed" data-zero="${completedCount === 0}">${completedCount} 완료</span>
        <span class="summary-pill" data-variant="failed" data-zero="${failedCount === 0}">${failedCount} 실패</span>
      `;
    }

    function renderAttachmentList() {
      attachmentListElement.innerHTML = dashboardState.attachments.map((attachmentItem, attachmentIndex) => {
        const inputTypeLabel = attachmentItem.type.startsWith('video/') ? 'VIDEO' : 'IMAGE';
        return `
          <span class="attachment-chip">
            <span>${inputTypeLabel}</span>
            <span class="label">${attachmentItem.name}</span>
            <button type="button" data-remove-index="${attachmentIndex}" aria-label="첨부 제거">×</button>
          </span>
        `;
      }).join('');

      attachmentListElement.querySelectorAll('[data-remove-index]').forEach((removeButtonElement) => {
        removeButtonElement.addEventListener('click', () => {
          const removeIndexValue = Number(removeButtonElement.dataset.removeIndex);
          dashboardState.attachments.splice(removeIndexValue, 1);
          renderAttachmentList();
          refreshSendButtonState();
        });
      });
    }

    function renderTasksTab() {
      tasksCountBadgeElement.textContent = String(dashboardState.tasks.length);
      if (!dashboardState.tasks.length) {
        tabPanelElement.innerHTML = `
          <div class="empty-state">
            <div>아직 실행된 작업이 없습니다.</div>
            <div>밈 영상을 업로드하거나 설명을 입력해 시작하세요.</div>
          </div>
        `;
        return;
      }

      tabPanelElement.innerHTML = `<div class="task-list">${dashboardState.tasks.map((taskItem) => buildTaskRow(taskItem)).join('')}</div>`;
      tabPanelElement.querySelectorAll('.task-row').forEach((taskRowElement) => {
        taskRowElement.addEventListener('click', () => {
          const runIdentifier = taskRowElement.dataset.runId;
          window.location.href = `/run/${runIdentifier}`;
        });
      });
    }

    function renderTabContent() {
      if (dashboardState.selectedTab === 'tasks') {
        renderTasksTab();
        return;
      }
      if (dashboardState.selectedTab === 'prompts') {
        tabPanelElement.innerHTML = '<div class="sub-panel">프롬프트 탭 콘텐츠는 추후 명세에 따라 확장됩니다.</div>';
        return;
      }
      tabPanelElement.innerHTML = '<div class="sub-panel">에셋 탭 콘텐츠는 추후 명세에 따라 확장됩니다.</div>';
    }

    function refreshSendButtonState() {
      const hasTextInput = promptInputElement.value.trim().length > 0;
      const hasAttachments = dashboardState.attachments.length > 0;
      sendButtonElement.classList.toggle('active', hasTextInput || hasAttachments);
    }

    function createTaskFromInput() {
      const trimmedInputText = promptInputElement.value.trim();
      if (!trimmedInputText && !dashboardState.attachments.length) {
        return;
      }

      const latestAttachment = dashboardState.attachments[0] || null;
      const nowIdentifier = Date.now();
      const createdTask = {
        id: `run-${nowIdentifier}`,
        title: trimmedInputText || `${latestAttachment.name} 기반 크리에이티브`,
        input: trimmedInputText || latestAttachment.name,
        inputType: latestAttachment ? (latestAttachment.type.startsWith('video/') ? 'video' : 'image') : 'text',
        status: 'running',
        phase: 1,
        phaseDetail: '분석 준비 중',
        activeExperts: ['hook', 'story', 'cta', 'action', 'character'],
        createdAt: '방금 전',
        tokens: 0,
        cost: 0
      };

      dashboardState.tasks.unshift(createdTask);
      promptInputElement.value = '';
      dashboardState.attachments = [];
      renderAttachmentList();
      renderStatusSummary();
      renderTabContent();
      refreshSendButtonState();
    }

    function bindEvents() {
      promptInputElement.addEventListener('input', refreshSendButtonState);
      promptInputElement.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          createTaskFromInput();
        }
      });

      sendButtonElement.addEventListener('click', createTaskFromInput);

      attachButtonElement.addEventListener('click', () => {
        fileInputElement.click();
      });

      fileInputElement.addEventListener('change', () => {
        const selectedFiles = Array.from(fileInputElement.files || []);
        const availableSlots = Math.max(0, 3 - dashboardState.attachments.length);
        const filesToAdd = selectedFiles.slice(0, availableSlots);
        dashboardState.attachments.push(...filesToAdd.map((selectedFile) => ({ name: selectedFile.name, type: selectedFile.type || 'image/*' })));
        fileInputElement.value = '';
        renderAttachmentList();
        refreshSendButtonState();
      });

      modelPillElement.addEventListener('click', () => {
        dashboardState.selectedModel = dashboardState.selectedModel === 'Gemini 3 Pro' ? 'Gemini 3.1 Pro Preview' : 'Gemini 3 Pro';
        modelPillElement.textContent = dashboardState.selectedModel;
      });

      roundPillElement.addEventListener('click', () => {
        dashboardState.selectedRounds = dashboardState.selectedRounds === 3 ? 5 : 3;
        roundPillElement.textContent = `토론 ${dashboardState.selectedRounds}R`;
      });

      document.querySelectorAll('.tab-button').forEach((tabButtonElement) => {
        tabButtonElement.addEventListener('click', () => {
          const nextTabName = tabButtonElement.dataset.tab;
          dashboardState.selectedTab = nextTabName;
          document.querySelectorAll('.tab-button').forEach((candidateButtonElement) => {
            const isActiveTab = candidateButtonElement === tabButtonElement;
            candidateButtonElement.classList.toggle('active', isActiveTab);
            candidateButtonElement.setAttribute('aria-selected', String(isActiveTab));
          });
          renderTabContent();
        });
      });
    }

    renderAttachmentList();
    renderStatusSummary();
    renderTabContent();
    refreshSendButtonState();
    bindEvents();
  </script>
</body>
</html>
