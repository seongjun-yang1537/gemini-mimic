<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Mimic Prompts</title>
    <style>
      .prompt-layout {
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 16px;
      }

      .prompt-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .phase-title {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 6px;
      }

      .phase-block {
        border-bottom: 1px solid var(--border);
        padding-bottom: 10px;
      }

      .phase-block:last-child {
        border-bottom: none;
      }

      .editor-panel {
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #editor {
        min-height: 52vh;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 13px;
        line-height: 1.6;
      }

      #feedback {
        min-height: 96px;
      }

      #suggestion {
        margin: 0;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-chat);
        white-space: pre-wrap;
        min-height: 120px;
      }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #tagSuggestion {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-chat);
        max-height: 220px;
        overflow-y: auto;
      }

      .tag-item {
        width: 100%;
        border: none;
        border-bottom: 1px solid var(--border);
        background: transparent;
        text-align: left;
        padding: 8px 12px;
        cursor: pointer;
      }

      .tag-item:last-child {
        border-bottom: none;
      }

      .tag-item:hover {
        background: var(--bg-tertiary);
      }

      @media (max-width: 960px) {
        .prompt-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-title">Mimic</div>
        <a href="/" class="sidebar-item">📋 대시보드</a>
        <a href="/prompts" class="sidebar-item active">📝 프롬프트</a>
        <a href="/assets" class="sidebar-item">🗂️ 에셋</a>
      </aside>

      <main class="main-content page-enter page-enter-active">
        <header class="page-header">
          <h1>프롬프트 관리</h1>
        </header>

        <section class="prompt-layout">
          <section class="card">
            <ul id="promptList" class="prompt-list"></ul>
          </section>

          <section class="card editor-panel">
            <div class="top-row">
              <h2 id="title">선택된 프롬프트 없음</h2>
              <span id="dirtyBadge" class="badge badge-warning hidden">수정됨</span>
            </div>

            <div style="position: relative;">
              <textarea id="editor"></textarea>
              <div id="tagSuggestion" class="hidden"></div>
            </div>

            <div>
              <button id="save" class="btn-primary">저장</button>
            </div>

            <textarea id="feedback" placeholder="피드백 입력"></textarea>
            <div>
              <button id="update" class="btn-secondary">AI 업데이트 제안</button>
            </div>
            <pre id="suggestion"></pre>
          </section>
        </section>
      </main>
    </div>

    <script>
      let selectedPrompt = null;
      let assetList = [];
      let originalPromptContent = '';

      function getCurrentTagQuery() {
        const editorElement = document.getElementById('editor');
        const cursorIndex = editorElement.selectionStart;
        const leftText = editorElement.value.slice(0, cursorIndex);
        const matchResult = leftText.match(/(?:^|\s)@([a-zA-Z0-9_가-힣]*)$/);
        if (!matchResult) {
          return null;
        }
        return {
          keyword: matchResult[1],
          cursorIndex,
        };
      }

      function hideTagSuggestion() {
        const suggestionElement = document.getElementById('tagSuggestion');
        suggestionElement.classList.add('hidden');
        suggestionElement.innerHTML = '';
      }

      function refreshDirtyBadge() {
        const dirtyBadgeElement = document.getElementById('dirtyBadge');
        const editorValue = document.getElementById('editor').value;
        const isDirty = selectedPrompt && editorValue !== originalPromptContent;
        dirtyBadgeElement.classList.toggle('hidden', !isDirty);
      }

      function showTagSuggestion(tagQuery) {
        const suggestionElement = document.getElementById('tagSuggestion');
        const filteredAssets = assetList.filter((assetItem) => assetItem.tagId.toLowerCase().includes(tagQuery.keyword.toLowerCase())).slice(0, 8);

        if (!filteredAssets.length) {
          hideTagSuggestion();
          return;
        }

        suggestionElement.innerHTML = filteredAssets.map((assetItem) => `
          <button type="button" data-tag-id="${assetItem.tagId}" class="tag-item">
            <span style="color: var(--accent);">@${assetItem.tagId}</span>
            <span class="caption"> ${assetItem.fileName} · ${assetItem.category}</span>
          </button>
        `).join('');
        suggestionElement.classList.remove('hidden');

        suggestionElement.querySelectorAll('[data-tag-id]').forEach((tagButtonElement) => {
          tagButtonElement.addEventListener('click', () => {
            const editorElement = document.getElementById('editor');
            const textBeforeCursor = editorElement.value.slice(0, tagQuery.cursorIndex);
            const textAfterCursor = editorElement.value.slice(tagQuery.cursorIndex);
            const replacedTextBeforeCursor = textBeforeCursor.replace(/@([a-zA-Z0-9_가-힣]*)$/, `@${tagButtonElement.dataset.tagId}`);
            editorElement.value = `${replacedTextBeforeCursor}${textAfterCursor}`;
            hideTagSuggestion();
            editorElement.focus();
            refreshDirtyBadge();
          });
        });
      }

      async function loadAssets() {
        const response = await fetch('/api/assets');
        assetList = await response.json();
      }

      async function loadPromptList() {
        const response = await fetch('/api/prompts');
        const prompts = await response.json();
        const groupedPrompts = prompts.reduce((bucketObject, promptItem) => {
          bucketObject[promptItem.phase] = bucketObject[promptItem.phase] || [];
          bucketObject[promptItem.phase].push(promptItem);
          return bucketObject;
        }, {});

        document.getElementById('promptList').innerHTML = Object.entries(groupedPrompts).map(([phaseName, promptItems]) => `
          <li class="phase-block">
            <div class="phase-title">${phaseName}</div>
            ${promptItems.map((promptItem) => `
              <button class="sidebar-item" data-phase="${promptItem.phase}" data-expert="${promptItem.expert}">${promptItem.expert}</button>
            `).join('')}
          </li>
        `).join('');

        document.querySelectorAll('button[data-phase]').forEach((promptButtonElement) => {
          promptButtonElement.addEventListener('click', async () => {
            selectedPrompt = { phase: promptButtonElement.dataset.phase, expert: promptButtonElement.dataset.expert };
            const promptResponse = await fetch(`/api/prompts/${selectedPrompt.phase}/${selectedPrompt.expert}`);
            const promptPayload = await promptResponse.json();
            originalPromptContent = promptPayload.content || '';
            document.getElementById('title').textContent = `${selectedPrompt.phase}/${selectedPrompt.expert}`;
            document.getElementById('editor').value = originalPromptContent;
            refreshDirtyBadge();
          });
        });
      }

      document.getElementById('editor').addEventListener('input', () => {
        const tagQuery = getCurrentTagQuery();
        refreshDirtyBadge();
        if (!tagQuery) {
          hideTagSuggestion();
          return;
        }
        showTagSuggestion(tagQuery);
      });

      document.getElementById('editor').addEventListener('click', () => {
        const tagQuery = getCurrentTagQuery();
        if (!tagQuery) {
          hideTagSuggestion();
          return;
        }
        showTagSuggestion(tagQuery);
      });

      document.getElementById('save').addEventListener('click', async () => {
        if (!selectedPrompt) {
          return;
        }
        await fetch(`/api/prompts/${selectedPrompt.phase}/${selectedPrompt.expert}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: document.getElementById('editor').value }),
        });
        originalPromptContent = document.getElementById('editor').value;
        refreshDirtyBadge();
        await loadPromptList();
      });

      document.getElementById('update').addEventListener('click', async () => {
        const response = await fetch('/api/prompts/ai-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ feedback: document.getElementById('feedback').value }),
        });
        const payload = await response.json();
        document.getElementById('suggestion').textContent = payload.suggestion || '';
      });

      Promise.all([loadAssets(), loadPromptList()]);
    </script>
  </body>
</html>
