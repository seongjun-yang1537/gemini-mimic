<!-- Generated under Codex compliance with AGENTS.md (gemini-mimic) -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mimic 설정</title>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div class="max-w-7xl mx-auto p-6">
      <header class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">Mimic 설정</h1>
        <a href="/" class="text-cyan-300 text-sm">대시보드로 돌아가기</a>
      </header>

      <div class="grid grid-cols-12 gap-4">
        <aside class="col-span-12 md:col-span-3 bg-slate-900 border border-slate-800 rounded-xl p-3 h-fit">
          <div id="categoryNav" class="space-y-2"></div>
        </aside>

        <main class="col-span-12 md:col-span-9 space-y-4">
          <section class="bg-slate-900 border border-slate-800 rounded-xl p-4">
            <div class="flex items-center justify-between mb-4">
              <h2 id="formTitle" class="text-lg font-semibold"></h2>
              <button id="resetCategoryButton" class="text-xs px-3 py-1 rounded bg-slate-700">카테고리 초기화</button>
            </div>
            <form id="settingsForm" class="space-y-4"></form>
          </section>

          <section class="sticky bottom-4 bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-wrap gap-2 items-center justify-between">
            <p id="dirtyStateText" class="text-sm text-amber-300 hidden">변경사항이 있습니다.</p>
            <div class="flex gap-2 ml-auto">
              <button id="resetAllButton" class="px-3 py-2 rounded bg-rose-700 text-sm">전체 초기화</button>
              <button id="saveButton" class="px-4 py-2 rounded bg-cyan-500 text-slate-950 font-semibold text-sm">저장</button>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script>
      const categoryLabelMap = {
        gemini: 'Gemini API',
        debate: '토론 시스템',
        video: '영상 생성',
        image: '이미지 생성',
        ffmpeg: '영상 편집',
        experts: '전문가 활성화',
        safety: '안전장치',
      };

      let settingsData = {};
      let defaultData = {};
      let schemaData = {};
      let draftData = {};
      let activeCategory = 'gemini';
      let hasUnsavedChanges = false;

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function flattenObject(sourceObject, prefix = '') {
        const flatResult = {};
        Object.entries(sourceObject || {}).forEach(([key, value]) => {
          const nextPath = prefix ? `${prefix}.${key}` : key;
          if (value && typeof value === 'object' && !Array.isArray(value)) {
            Object.assign(flatResult, flattenObject(value, nextPath));
            return;
          }
          flatResult[nextPath] = value;
        });
        return flatResult;
      }

      function getPathValue(targetObject, keyPath) {
        return keyPath.split('.').reduce((currentValue, key) => {
          if (currentValue === undefined || currentValue === null) {
            return undefined;
          }
          return currentValue[key];
        }, targetObject);
      }

      function setPathValue(targetObject, keyPath, value) {
        const keyParts = keyPath.split('.');
        let currentNode = targetObject;
        for (let index = 0; index < keyParts.length - 1; index += 1) {
          const key = keyParts[index];
          if (!currentNode[key] || typeof currentNode[key] !== 'object') {
            currentNode[key] = {};
          }
          currentNode = currentNode[key];
        }
        currentNode[keyParts[keyParts.length - 1]] = value;
      }

      function parseInputValue(schema, rawValue) {
        if (schema.type === 'number' || schema.type === 'slider') {
          return Number(rawValue);
        }
        if (schema.type === 'boolean') {
          return Boolean(rawValue);
        }
        return rawValue;
      }


      function getVisibleCategories() {
        const visibleCategorySet = new Set(
          Object.values(schemaData)
            .filter((schema) => !schema.hidden)
            .map((schema) => schema.category),
        );

        return Object.keys(categoryLabelMap).filter((categoryKey) => visibleCategorySet.has(categoryKey));
      }

      function buildCategoryNav() {
        const navContainer = document.getElementById('categoryNav');
        const visibleCategories = getVisibleCategories();
        if (!visibleCategories.includes(activeCategory)) {
          [activeCategory] = visibleCategories;
        }

        navContainer.innerHTML = visibleCategories
          .map((categoryKey) => {
            const selectedClass = categoryKey === activeCategory ? 'bg-cyan-500 text-slate-950 font-semibold' : 'bg-slate-800';
            return `<button data-category="${categoryKey}" class="w-full text-left px-3 py-2 rounded ${selectedClass}">${categoryLabelMap[categoryKey]}</button>`;
          })
          .join('');

        navContainer.querySelectorAll('button').forEach((buttonElement) => {
          buttonElement.addEventListener('click', () => {
            activeCategory = buttonElement.dataset.category;
            renderForm();
            buildCategoryNav();
          });
        });
      }

      function buildControlMarkup(keyPath, schema, currentValue, defaultValue) {
        const modifiedBadge = String(currentValue) !== String(defaultValue)
          ? '<span class="text-xs text-amber-300 border border-amber-400 px-2 py-0.5 rounded">수정됨</span>'
          : '';
        const readOnlyBadge = schema.readOnly
          ? '<span class="text-xs text-slate-200 border border-slate-500 px-2 py-0.5 rounded">읽기 전용</span>'
          : '';
        const readOnly = schema.readOnly ? 'disabled' : '';

        if (schema.type === 'boolean') {
          return `
            <label class="flex items-center gap-3">
              <input type="checkbox" data-key-path="${keyPath}" ${currentValue ? 'checked' : ''} ${readOnly} class="h-5 w-5" />
              <span>${schema.label}</span>
            </label>
            <div class="ml-auto flex items-center gap-2">${readOnlyBadge}${modifiedBadge}<button type="button" data-reset-key="${keyPath}" class="text-xs px-2 py-1 rounded bg-slate-700">초기화</button></div>
          `;
        }

        if (schema.type === 'select') {
          return `
            <div class="flex-1">
              <label class="text-sm block mb-1">${schema.label}</label>
              <select data-key-path="${keyPath}" ${readOnly} class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2">
                ${schema.options.map((optionValue) => `<option value="${optionValue}" ${String(optionValue) === String(currentValue) ? 'selected' : ''}>${optionValue}</option>`).join('')}
              </select>
            </div>
            <div class="flex items-center gap-2">${readOnlyBadge}${modifiedBadge}<button type="button" data-reset-key="${keyPath}" class="text-xs px-2 py-1 rounded bg-slate-700">초기화</button></div>
          `;
        }

        if (schema.type === 'slider') {
          return `
            <div class="flex-1">
              <label class="text-sm block mb-1">${schema.label} <span class="text-cyan-300">${currentValue}</span></label>
              <input type="range" data-key-path="${keyPath}" min="${schema.min}" max="${schema.max}" step="${schema.step || 1}" value="${currentValue}" ${readOnly} class="w-full" />
            </div>
            <div class="flex items-center gap-2">${readOnlyBadge}${modifiedBadge}<button type="button" data-reset-key="${keyPath}" class="text-xs px-2 py-1 rounded bg-slate-700">초기화</button></div>
          `;
        }

        if (schema.sensitive) {
          const maskedText = settingsData.gemini.apiKeyMasked || "미설정";
          return `
            <div class="flex-1">
              <label class="text-sm block mb-1">${schema.label}</label>
              <input type="password" data-key-path="${keyPath}" value="" placeholder="새 API 키 입력" ${readOnly} class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2" />
              <p class="text-xs text-slate-400 mt-1">현재 저장값: ${maskedText}</p>
            </div>
            <div class="flex items-center gap-2">${readOnlyBadge}${modifiedBadge}<button type="button" data-reset-key="${keyPath}" class="text-xs px-2 py-1 rounded bg-slate-700">초기화</button></div>
          `;
        }

        return `
          <div class="flex-1">
            <label class="text-sm block mb-1">${schema.label}</label>
            <input type="${schema.type === 'number' ? 'number' : 'text'}" data-key-path="${keyPath}" value="${currentValue}" ${schema.min !== undefined ? `min="${schema.min}"` : ''} ${schema.max !== undefined ? `max="${schema.max}"` : ''} ${readOnly} class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2" />
          </div>
          <div class="flex items-center gap-2">${readOnlyBadge}${modifiedBadge}<button type="button" data-reset-key="${keyPath}" class="text-xs px-2 py-1 rounded bg-slate-700">초기화</button></div>
        `;
      }

      function renderForm() {
        const formTitleElement = document.getElementById('formTitle');
        formTitleElement.textContent = categoryLabelMap[activeCategory];

        const formElement = document.getElementById('settingsForm');
        const categoryKeys = Object.entries(schemaData)
          .filter(([, schema]) => schema.category === activeCategory && !schema.hidden)
          .map(([keyPath]) => keyPath);

        formElement.innerHTML = categoryKeys
          .map((keyPath) => {
            const schema = schemaData[keyPath];
            const currentValue = getPathValue(draftData, keyPath);
            const defaultValue = getPathValue(defaultData, keyPath);
            return `<div class="border border-slate-800 rounded-lg p-3 flex items-center gap-3">${buildControlMarkup(keyPath, schema, currentValue, defaultValue)}</div>`;
          })
          .join('');

        formElement.querySelectorAll('[data-key-path]').forEach((inputElement) => {
          const keyPath = inputElement.dataset.keyPath;
          const schema = schemaData[keyPath];
          const updateValue = () => {
            const rawValue = inputElement.type === 'checkbox' ? inputElement.checked : inputElement.value;
            if (schema.sensitive && rawValue === '') {
              return;
            }
            setPathValue(draftData, keyPath, parseInputValue(schema, rawValue));
            syncDirtyState();
            renderForm();
          };
          inputElement.addEventListener('change', updateValue);
          if (schema.type === 'slider') {
            inputElement.addEventListener('input', updateValue);
          }
        });

        formElement.querySelectorAll('[data-reset-key]').forEach((buttonElement) => {
          buttonElement.addEventListener('click', () => {
            const keyPath = buttonElement.dataset.resetKey;
            setPathValue(draftData, keyPath, getPathValue(defaultData, keyPath));
            syncDirtyState();
            renderForm();
          });
        });
      }

      function syncDirtyState() {
        hasUnsavedChanges = JSON.stringify(draftData) !== JSON.stringify(settingsData);
        document.getElementById('dirtyStateText').classList.toggle('hidden', !hasUnsavedChanges);
      }

      async function fetchSettings() {
        const response = await fetch('/api/settings');
        const payload = await response.json();
        settingsData = payload.settings;
        defaultData = payload.defaults;
        schemaData = payload.schema;
        draftData = deepClone(settingsData);
        syncDirtyState();
        buildCategoryNav();
        renderForm();
      }

      function buildPatchPayload() {
        const originalFlat = flattenObject(settingsData);
        const draftFlat = flattenObject(draftData);
        const patchPayload = {};

        Object.entries(draftFlat).forEach(([keyPath, draftValue]) => {
          if (String(originalFlat[keyPath]) !== String(draftValue)) {
            patchPayload[keyPath] = draftValue;
          }
        });

        return patchPayload;
      }

      document.getElementById('saveButton').addEventListener('click', async () => {
        const patchPayload = buildPatchPayload();
        const response = await fetch('/api/settings', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patchPayload),
        });
        const payload = await response.json();
        if (!response.ok) {
          alert(payload.error || '저장에 실패했습니다.');
          return;
        }
        await fetchSettings();
      });

      document.getElementById('resetAllButton').addEventListener('click', async () => {
        if (!confirm('모든 설정을 기본값으로 되돌리시겠습니까?')) {
          return;
        }
        await fetch('/api/settings/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        });
        await fetchSettings();
      });

      document.getElementById('resetCategoryButton').addEventListener('click', async () => {
        if (!confirm(`${categoryLabelMap[activeCategory]} 카테고리를 초기화하시겠습니까?`)) {
          return;
        }
        await fetch('/api/settings/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ category: activeCategory }),
        });
        await fetchSettings();
      });

      window.addEventListener('beforeunload', (event) => {
        if (!hasUnsavedChanges) {
          return;
        }
        event.preventDefault();
        event.returnValue = '';
      });

      fetchSettings();
    </script>
  </body>
</html>
