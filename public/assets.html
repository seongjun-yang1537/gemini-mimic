<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mimic Assets</title>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div class="max-w-7xl mx-auto p-6 space-y-5">
      <header class="flex items-center justify-between">
        <div class="space-y-1">
          <a href="/" class="text-cyan-300 text-sm">← 대시보드</a>
          <h1 class="text-2xl font-bold">에셋 관리</h1>
        </div>
        <form id="uploadForm" class="flex gap-2 items-center">
          <input type="file" name="file" id="uploadFile" class="text-sm" required />
          <button class="bg-cyan-500 text-slate-950 px-4 py-2 rounded-lg font-semibold">업로드</button>
        </form>
      </header>

      <div class="grid grid-cols-12 gap-4">
        <aside class="col-span-3 bg-slate-900 border border-slate-800 rounded-xl p-3">
          <ul id="folderList" class="space-y-2 text-sm"></ul>
        </aside>
        <main class="col-span-9 space-y-3">
          <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 flex gap-2 items-center">
            <input id="searchInput" placeholder="파일명/태그 검색" class="flex-1 bg-slate-950 border border-slate-700 rounded px-3 py-2" />
            <button id="gridMode" class="px-3 py-2 bg-slate-800 rounded">그리드</button>
            <button id="listMode" class="px-3 py-2 bg-slate-800 rounded">리스트</button>
          </div>
          <section id="assetContainer" class="bg-slate-900 border border-slate-800 rounded-xl p-4"></section>
        </main>
      </div>
    </div>

    <script>
      const categoryLabel = {
        input: 'inputs',
        reference: 'references',
        generated_image: 'generated/images',
        generated_video: 'generated/videos',
        export: 'exports',
      };

      let selectedCategory = '';
      let isGridMode = true;
      let cachedAssets = [];

      function formatFileSize(byteSize) {
        if (!byteSize) return '-';
        const sizeUnits = ['B', 'KB', 'MB', 'GB'];
        let sizeIndex = 0;
        let displaySize = byteSize;
        while (displaySize >= 1024 && sizeIndex < sizeUnits.length - 1) {
          displaySize /= 1024;
          sizeIndex += 1;
        }
        return `${displaySize.toFixed(1)} ${sizeUnits[sizeIndex]}`;
      }

      function renderFolders() {
        const categoryCountMap = cachedAssets.reduce((bucket, assetItem) => {
          bucket[assetItem.category] = (bucket[assetItem.category] || 0) + 1;
          return bucket;
        }, {});

        const categoryButtons = ['input', 'reference', 'generated_image', 'generated_video', 'export']
          .map((categoryName) => `
            <li>
              <button data-category="${categoryName}" class="w-full text-left px-2 py-2 rounded ${selectedCategory === categoryName ? 'bg-cyan-500 text-slate-950' : 'bg-slate-800'}">
                ${categoryLabel[categoryName]} <span class="text-xs opacity-80">(${categoryCountMap[categoryName] || 0})</span>
              </button>
            </li>
          `)
          .join('');

        document.getElementById('folderList').innerHTML = `
          <li><button data-category="" class="w-full text-left px-2 py-2 rounded ${selectedCategory === '' ? 'bg-cyan-500 text-slate-950' : 'bg-slate-800'}">전체</button></li>
          ${categoryButtons}
        `;

        document.querySelectorAll('button[data-category]').forEach((button) => {
          button.addEventListener('click', async () => {
            selectedCategory = button.dataset.category;
            await loadAssets();
          });
        });
      }

      function buildGridCards(assetList) {
        return `<div class="grid grid-cols-3 gap-3">${assetList
          .map((assetItem) => {
            const previewElement = assetItem.mimeType.startsWith('image/')
              ? `<img src="/api/assets/${assetItem.id}/thumbnail" class="w-full h-36 object-cover rounded" />`
              : `<video src="/api/assets/${assetItem.id}/thumbnail" class="w-full h-36 object-cover rounded" muted></video>`;

            return `
              <article class="border border-slate-700 rounded-lg p-2 space-y-2">
                ${previewElement}
                <p class="text-sm truncate">${assetItem.fileName}</p>
                <button data-copy-tag="${assetItem.tagId}" class="text-cyan-300 text-xs">@${assetItem.tagId}</button>
                <p class="text-xs text-slate-400">${assetItem.category} · ${formatFileSize(assetItem.fileSize)}</p>
              </article>
            `;
          })
          .join('')}</div>`;
      }

      function buildListTable(assetList) {
        return `
          <table class="w-full text-sm">
            <thead class="text-slate-400">
              <tr>
                <th class="text-left pb-2">파일명</th>
                <th class="text-left pb-2">태그</th>
                <th class="text-left pb-2">카테고리</th>
                <th class="text-left pb-2">크기</th>
                <th class="text-left pb-2">생성일</th>
              </tr>
            </thead>
            <tbody>
              ${assetList
                .map(
                  (assetItem) => `
                    <tr class="border-t border-slate-800">
                      <td class="py-2"><a href="/api/assets/${assetItem.id}/file" class="text-cyan-200">${assetItem.fileName}</a></td>
                      <td><button data-copy-tag="${assetItem.tagId}" class="text-cyan-300">@${assetItem.tagId}</button></td>
                      <td>${assetItem.category}</td>
                      <td>${formatFileSize(assetItem.fileSize)}</td>
                      <td>${new Date(assetItem.createdAt).toLocaleString()}</td>
                    </tr>
                  `,
                )
                .join('')}
            </tbody>
          </table>
        `;
      }

      function bindCopyButtonEvents() {
        document.querySelectorAll('button[data-copy-tag]').forEach((button) => {
          button.addEventListener('click', async () => {
            await navigator.clipboard.writeText(`@${button.dataset.copyTag}`);
          });
        });
      }

      async function loadAssets() {
        const searchKeyword = document.getElementById('searchInput').value;
        const queryString = new URLSearchParams();
        if (selectedCategory) queryString.set('category', selectedCategory);
        if (searchKeyword) queryString.set('q', searchKeyword);

        const response = await fetch(`/api/assets?${queryString.toString()}`);
        const assetList = await response.json();
        const containerElement = document.getElementById('assetContainer');
        containerElement.innerHTML = isGridMode ? buildGridCards(assetList) : buildListTable(assetList);
        bindCopyButtonEvents();

        const allResponse = await fetch('/api/assets');
        cachedAssets = await allResponse.json();
        renderFolders();
      }

      document.getElementById('searchInput').addEventListener('input', loadAssets);
      document.getElementById('gridMode').addEventListener('click', async () => {
        isGridMode = true;
        await loadAssets();
      });
      document.getElementById('listMode').addEventListener('click', async () => {
        isGridMode = false;
        await loadAssets();
      });

      document.getElementById('uploadForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const selectedFile = document.getElementById('uploadFile').files[0];
        if (!selectedFile) return;

        const formData = new FormData();
        formData.append('file', selectedFile);
        await fetch('/api/assets/upload', { method: 'POST', body: formData });
        event.target.reset();
        await loadAssets();
      });

      loadAssets();
    </script>
  </body>
</html>
